<section id="education" class="education-section">
  <div class="container">
    <h2 class="section-label">Education</h2>
    <div class="section-underline"></div>

    <div class="education-timeline">
      <div
        class="timeline-item"
        *ngFor="let edu of educationItems"
      >
        <div class="timeline-dot">
          🎓
        </div>

        <div class="education-card">
          <div class="card-header">
            <h3 class="title">{{ edu.title }}</h3>
            <span class="status-badge" [ngClass]="edu.statusColor">
              {{ edu.status }}
            </span>
          </div>

          <p class="institution">{{ edu.institution }}</p>

          <ng-container *ngIf="edu.details.length > 0">
            <h4 class="coverage-title">Key Academic Coverage</h4>
            <ul class="coverage-list">
              <li *ngFor="let detail of edu.details">
                <span class="dot"></span>
                {{ detail }}
              </li>
            </ul>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
</section>
